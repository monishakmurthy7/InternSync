<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>InternSync — Reset Password</title>
<style>
  /* paste the same :root, *, body, .card, input, button, .err styles 
     from your auth.html — they're identical */
  :root { --accent:#d9a441; }
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
  body { height:100vh; display:flex; justify-content:center; align-items:center; background:#1a1d0f; }
  .card {
    width:390px; padding:35px; border-radius:18px;
    background:rgba(255,255,255,.06); backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.15);
    box-shadow:0 20px 60px rgba(0,0,0,.6);
  }
  h2 { text-align:center; color:#fff; margin-bottom:20px; font-size:20px; letter-spacing:.05em; }
  input {
    width:100%; padding:12px; margin:8px 0;
    border:1px solid rgba(255,255,255,.08); border-radius:10px;
    background:rgba(255,255,255,.1); color:#fff; outline:none; font-size:14px;
  }
  input:focus { background:rgba(255,255,255,.16); border-color:rgba(217,164,65,.45); }
  input::placeholder { color:rgba(255,255,255,.38); }
  button {
    width:100%; padding:12px; margin-top:10px;
    border:2px solid transparent; border-radius:30px;
    background:var(--accent); color:#fff;
    font-weight:bold; font-size:14px; cursor:pointer;
    transition:all .25s;
  }
  button:hover {
    background:transparent; border-color:var(--accent);
    color:var(--accent); letter-spacing:1.5px;
  }
  .err { color:#ff6b6b; font-size:13px; margin-top:6px; min-height:18px; }
  .note { color:rgba(255,255,255,.4); font-size:12.5px; text-align:center; margin-top:12px; }
  .iw { position:relative; }
  .iw input { padding-right:44px; }
  .eye {
    position:absolute; right:12px; top:50%; transform:translateY(-50%);
    background:none; border:none; cursor:pointer; color:rgba(255,255,255,.4);
    display:flex; align-items:center; padding:0;
  }
  .eye svg { width:18px; height:18px; }
</style>
</head>
<body>
<div class="card">
  <h2>Set New Password</h2>

  <div class="iw">
    <input type="password" id="pw" placeholder="New Password">
    <button class="eye" type="button" onclick="toggleEye('pw', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>

  <div class="iw">
    <input type="password" id="pw2" placeholder="Confirm Password">
    <button class="eye" type="button" onclick="toggleEye('pw2', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>

  <div class="err" id="err"></div>
  <button id="btn" onclick="doReset()">Update Password</button>
  <p class="note" id="note"></p>
</div>

<script>
const API = 'http://localhost:3000/api';

// Grab token from URL
const token = new URLSearchParams(window.location.search).get('token');

if (!token) {
  document.getElementById('err').textContent = 'Invalid or missing reset link.';
  document.getElementById('btn').disabled = true;
}

function toggleEye(inputId, btn) {
  const input = document.getElementById(inputId);
  const svg = btn.querySelector('svg');
  if (input.type === 'password') {
    input.type = 'text';
    svg.innerHTML = `
      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
      <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
      <line x1="1" y1="1" x2="23" y2="23"/>`;
  } else {
    input.type = 'password';
    svg.innerHTML = `
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>`;
  }
}

async function doReset() {
  const pw   = document.getElementById('pw').value;
  const pw2  = document.getElementById('pw2').value;
  const err  = document.getElementById('err');
  const btn  = document.getElementById('btn');
  const note = document.getElementById('note');

  err.textContent = '';
  note.textContent = '';

  if (!pw || !pw2)            { err.textContent = 'Please fill both fields.'; return; }
  if (pw.length < 6)          { err.textContent = 'Password must be at least 6 characters.'; return; }
  if (pw !== pw2)             { err.textContent = 'Passwords do not match.'; return; }

  btn.textContent = 'Updating...';
  btn.disabled = true;

  try {
    const res  = await fetch(`${API_BASE}/auth/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, newPassword: pw })
    });
    const data = await res.json();

    if (!res.ok) {
      err.textContent = data.error || 'Something went wrong.';
      btn.textContent = 'Update Password';
      btn.disabled = false;
      return;
    }

    note.textContent = '✅ Password updated! Redirecting to login...';
    setTimeout(() => window.location.href = '/pages/auth.html', 2000);

  } catch (e) {
    err.textContent = 'Server not reachable.';
    btn.textContent = 'Update Password';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
