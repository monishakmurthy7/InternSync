<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InternSync &#8212; Chat with Mentor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{ --accent:#d9a441; --accent2:#f0c060; --bg:#1a1d0f; --card-bg:rgba(255,255,255,0.055); --card-border:rgba(255,255,255,0.13); --text:#f0ede4; --muted:rgba(240,237,228,0.45); --teal:#2dd4bf; --red:#ff6b6b; --sidebar-w:230px; }
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; display:flex; flex-direction:column; }
#meshCanvas{ position:fixed; inset:0; z-index:0; pointer-events:none; }
.glow{ position:fixed; width:380px; height:380px; background:radial-gradient(circle,rgba(217,164,65,.18),transparent 70%); border-radius:50%; pointer-events:none; filter:blur(60px); transform:translate(-50%,-50%); z-index:1; }
.layout{ display:flex; flex:1; position:relative; z-index:5; overflow:hidden; min-height:0; height:calc(100vh - 65px); }
.sidebar{ width:var(--sidebar-w); flex-shrink:0; background:rgba(10,13,6,.6); backdrop-filter:blur(20px); border-right:1px solid rgba(255,255,255,.07); padding:24px 0; display:flex; flex-direction:column; overflow-y:auto; }
.sidebar::-webkit-scrollbar{ width:3px; } .sidebar::-webkit-scrollbar-thumb{ background:rgba(217,164,65,.15); border-radius:4px; }
.sidebar-section{ font-family:'Syne',sans-serif; font-size:9px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:rgba(240,237,228,.2); padding:0 20px; margin:18px 0 8px; }
.sidebar-section:first-child{ margin-top:0; }
.nav-item{ display:flex; align-items:center; gap:11px; padding:10px 20px; cursor:pointer; position:relative; color:var(--muted); font-size:13px; font-weight:500; transition:color .2s,background .2s; text-decoration:none; }
.nav-item svg{ width:16px; height:16px; stroke:currentColor; flex-shrink:0; }
.nav-item:hover{ color:var(--text); background:rgba(255,255,255,.04); }
.nav-item.active{ color:var(--accent); background:rgba(217,164,65,.08); border-right:2px solid var(--accent); }
.nav-item.active svg{ stroke:var(--accent); }
main{ flex:1; display:flex; flex-direction:column; overflow:hidden; min-height:0; }
.chat-header{ padding:16px 28px; display:flex; align-items:center; gap:14px; border-bottom:1px solid rgba(255,255,255,.07); background:rgba(15,18,8,.6); backdrop-filter:blur(20px); flex-shrink:0; position:relative; z-index:5; }
.mentor-avatar-wrap{ position:relative; }
.mentor-av{ width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,rgba(45,212,191,.3),rgba(45,212,191,.1)); border:2px solid rgba(45,212,191,.4); display:flex; align-items:center; justify-content:center; overflow:hidden; padding:0; }
.online-ring{ position:absolute; bottom:1px; right:1px; width:12px; height:12px; border-radius:50%; background:var(--teal); border:2px solid var(--bg); box-shadow:0 0 8px rgba(45,212,191,.7); animation:pulse 2s infinite; }
@keyframes pulse{ 0%,100%{box-shadow:0 0 8px rgba(45,212,191,.7)} 50%{box-shadow:0 0 14px rgba(45,212,191,.9)} }
.mentor-info{ flex:1; }
.mentor-name-h{ font-family:'Syne',sans-serif; font-size:15px; font-weight:700; }
.mentor-status{ font-size:11px; color:var(--teal); display:flex; align-items:center; gap:5px; margin-top:2px; }
.mentor-status::before{ content:''; width:5px; height:5px; border-radius:50%; background:var(--teal); }
.private-badge{ display:flex; align-items:center; gap:6px; background:rgba(217,164,65,.1); border:1px solid rgba(217,164,65,.25); border-radius:20px; padding:5px 12px; font-family:'Syne',sans-serif; font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); }
.private-badge svg{ width:12px; height:12px; stroke:var(--accent); }
.messages{ flex:1; overflow-y:auto; padding:24px 28px; display:flex; flex-direction:column; gap:16px; min-height:0; }
.messages::-webkit-scrollbar{ width:4px; } .messages::-webkit-scrollbar-track{ background:transparent; } .messages::-webkit-scrollbar-thumb{ background:rgba(217,164,65,.2); border-radius:4px; }
.time-divider{ display:flex; align-items:center; gap:12px; margin:4px 0; }
.time-divider::before,.time-divider::after{ content:''; flex:1; height:1px; background:rgba(255,255,255,.05); }
.time-divider span{ font-size:10px; color:rgba(240,237,228,.2); white-space:nowrap; font-family:'Syne',sans-serif; letter-spacing:.08em; }
.msg-row{ display:flex; gap:10px; align-items:flex-end; }
.msg-row.me{ flex-direction:row-reverse; }
.msg-av{ width:32px; height:32px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; overflow:hidden; padding:0; }
.msg-av.mentor-av-sm{ background:rgba(45,212,191,.15); border:1.5px solid rgba(45,212,191,.3); }
.msg-av.me-av-sm{ background:rgba(217,164,65,.2); border:1.5px solid rgba(217,164,65,.35); }
.msg-content{ max-width:65%; display:flex; flex-direction:column; gap:3px; }
.msg-row.me .msg-content{ align-items:flex-end; }
.msg-bubble{ padding:11px 15px; border-radius:16px; font-size:13px; line-height:1.65; word-break:break-word; }
.msg-row:not(.me) .msg-bubble{ background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.09); border-bottom-left-radius:4px; color:var(--text); }
.msg-row.me .msg-bubble{ background:rgba(217,164,65,.18); border:1px solid rgba(217,164,65,.3); border-bottom-right-radius:4px; color:var(--text); }
.msg-footer{ display:flex; align-items:center; gap:5px; padding:0 4px; }
.msg-time{ font-size:10px; color:rgba(240,237,228,.22); }
.read-tick{ font-size:11px; color:var(--teal); }
.typing-indicator{ display:flex; align-items:center; gap:10px; padding:0; opacity:0; transition:opacity .3s; }
.typing-indicator.show{ opacity:1; }
.typing-dots{ display:flex; gap:4px; }
.typing-dots span{ width:6px; height:6px; border-radius:50%; background:var(--muted); animation:typingBounce 1.2s infinite; }
.typing-dots span:nth-child(2){ animation-delay:.2s; } .typing-dots span:nth-child(3){ animation-delay:.4s; }
@keyframes typingBounce{ 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
.input-area{ padding:14px 20px 18px; border-top:1px solid rgba(255,255,255,.06); background:rgba(10,13,6,.5); backdrop-filter:blur(16px); flex-shrink:0; }
.input-row{ display:flex; align-items:flex-end; gap:10px; }
.input-wrap{ flex:1; position:relative; }
textarea#chatInput{ width:100%; padding:11px 16px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.09); border-radius:12px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px; resize:none; outline:none; line-height:1.5; max-height:100px; transition:border-color .2s,background .2s,box-shadow .2s; overflow-y:auto; }
textarea#chatInput:focus{ border-color:rgba(217,164,65,.4); background:rgba(255,255,255,.1); box-shadow:0 0 0 3px rgba(217,164,65,.07); }
textarea#chatInput::placeholder{ color:rgba(240,237,228,.2); }
.btn-send{ width:42px; height:42px; border-radius:12px; flex-shrink:0; background:var(--accent); border:2px solid transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .25s,box-shadow .25s,border-color .25s; }
.btn-send:hover{ background:transparent; border-color:var(--accent); box-shadow:0 4px 16px rgba(217,164,65,.35); }
.btn-send:hover svg{ stroke:var(--accent); }
.btn-send svg{ width:17px; height:17px; stroke:#1a1d0f; transition:stroke .25s; }
.input-hint{ font-size:10px; color:rgba(240,237,228,.18); margin-top:8px; text-align:center; letter-spacing:.04em; }
.input-hint svg{ width:10px; height:10px; stroke:rgba(240,237,228,.3); display:inline; vertical-align:-1px; margin-right:3px; }
.particle{ position:fixed; border-radius:50%; background:rgba(217,164,65,.14); pointer-events:none; z-index:2; animation:floatUp linear infinite; }
@keyframes floatUp{ 0%{transform:translateY(0) scale(1);opacity:.4} 50%{transform:translateY(-70px) scale(1.1);opacity:.15} 100%{transform:translateY(-140px) scale(.8);opacity:0} }
</style>
</head>

// ── DOM REFS ──────────────────────────────────────────────────────────────────
const msgContainer = document.getElementById('messages');
const typingEl     = document.getElementById('typingIndicator');
const chatInput    = document.getElementById('chatInput');
let typingTimer    = null;

// ── SET AVATARS ───────────────────────────────────────────────────────────────
(function setAvatars(){
  document.getElementById('mentorAvatarHeader').innerHTML =
    `<img src="${RAJ_SRC}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;" alt="Raj Sharma"/>`;
  document.getElementById('typingAvatar').innerHTML =
    `<img src="${RAJ_SRC}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;" alt="Raj"/>`;
})();

// ── HELPERS ───────────────────────────────────────────────────────────────────
function timeDivider(label){
  const d = document.createElement('div');
  d.className = 'time-divider';
  d.innerHTML = `<span>${label}</span>`;
  msgContainer.appendChild(d);
}

function renderMsg(msg, animate = false){
  const isMe = msg.from === 'me';
  const row  = document.createElement('div');
  row.className = `msg-row${isMe ? ' me' : ''}`;

  if(animate){
    row.style.cssText = 'opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s';
  }

  const src      = isMe ? MON_SRC : RAJ_SRC;
  const cls      = isMe ? 'me-av-sm' : 'mentor-av-sm';
  const readTick = isMe
    ? `<span class="read-tick">${msg.read ? '&#10003;&#10003;' : '&#10003;'}</span>`
    : '';

  row.innerHTML = `
    <div class="msg-av ${cls}">
      <img src="${src}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;" alt=""/>
    </div>
    <div class="msg-content">
      <div class="msg-bubble">${msg.text}</div>
      <div class="msg-footer">
        <span class="msg-time">${msg.time}</span>${readTick}
      </div>
    </div>`;

  msgContainer.appendChild(row);

  if(animate){
    requestAnimationFrame(() => requestAnimationFrame(() => {
      row.style.opacity   = '1';
      row.style.transform = 'translateY(0)';
    }));
  }
}

function scrollToBottom(){
  msgContainer.scrollTop = msgContainer.scrollHeight;
}

function formatTime(dateStr){
  return new Date(dateStr).toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
}

function nowTime(){
  return new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
}

// ── TYPING → REPLY (only triggered after user sends a message) ────────────────
function showTypingThenReply(){
  clearTimeout(typingTimer);
  typingEl.classList.add('show');
  scrollToBottom();

  typingTimer = setTimeout(() => {
    typingEl.classList.remove('show');
    renderMsg({ from:'mentor', text:'Hi Monisha!', time: nowTime(), read: false }, true);
    scrollToBottom();
  }, 2000);
}

// ── SEND MESSAGE ──────────────────────────────────────────────────────────────
async function sendMessage(){
  const text = chatInput.value.trim();
  if(!text) return;

  // 1. Render user's message immediately
  renderMsg({ from:'me', text, time: nowTime(), read: false }, true);
  chatInput.value = '';
  chatInput.style.height = 'auto';
  scrollToBottom();

  // 2. Try to save to DB (UI still works if server is down)
  try {
    await fetch(`${API_BASE}/internchat/send`, {
      method  : 'POST',
      headers : { 'Content-Type': 'application/json' },
      body    : JSON.stringify({ sender_id: INTERN_ID, receiver_id: MENTOR_ID, message: text })
    });
  } catch(err){
    console.warn('Could not save to DB:', err.message);
  }

  // 3. Show "Raj is typing…" then reply "Hi Monisha!"
  showTypingThenReply();
}

// ── LOAD MESSAGES ─────────────────────────────────────────────────────────────
async function loadMessages(){
  timeDivider('Today');
  let loaded = false;

  try {
    const res = await fetch(`${API_BASE}/internchat/${INTERN_ID}/${MENTOR_ID}`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();
    if(Array.isArray(data) && data.length > 0){
      data.forEach(msg => {
        renderMsg({
          from : msg.sender_id === INTERN_ID ? 'me' : 'mentor',
          text : msg.message,
          time : formatTime(msg.sent_at),
          read : true
        });
      });
      loaded = true;
    }
  } catch(err){
    console.warn('Could not load from DB — showing seed messages.', err.message);
  }

  if(!loaded){ SEED.forEach(m => renderMsg(m)); }
  setTimeout(scrollToBottom, 50);
}

// ── INPUT EVENTS ──────────────────────────────────────────────────────────────
chatInput.addEventListener('keydown', e => {
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
});
chatInput.addEventListener('input', function(){
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// Wire send button
document.getElementById('sendBtn').addEventListener('click', sendMessage);

// ── CANVAS BACKGROUND ─────────────────────────────────────────────────────────
const cvs = document.getElementById('meshCanvas');
const ctx  = cvs.getContext('2d');
let W, H;

function rsz(){ W = cvs.width = innerWidth; H = cvs.height = innerHeight; }
rsz();
addEventListener('resize', rsz);

const pts = [
  { ax:.65, ay:.25, rx:.3,  ry:.2,  fx:.00028, fy:.00016, px:0,   py:1,   r:620, c:'rgba(180,120,20,' },
  { ax:.2,  ay:.65, rx:.22, ry:.28, fx:.00018, fy:.00026, px:2.4, py:0,   r:540, c:'rgba(155,100,15,' },
  { ax:.5,  ay:.1,  rx:.28, ry:.2,  fx:.00022, fy:.00014, px:1,   py:2,   r:580, c:'rgba(50,65,20,'   },
  { ax:.88, ay:.78, rx:.2,  ry:.22, fx:.00013, fy:.00031, px:.5,  py:.8,  r:500, c:'rgba(44,58,18,'   },
  { ax:.08, ay:.18, rx:.18, ry:.22, fx:.00025, fy:.0002,  px:3,   py:1.5, r:460, c:'rgba(20,24,12,'   },
  { ax:.55, ay:.88, rx:.24, ry:.18, fx:.00017, fy:.00023, px:1.8, py:2.7, r:490, c:'rgba(28,32,16,'   }
];

function mesh(t){
  ctx.fillStyle = '#1a1d0f';
  ctx.fillRect(0, 0, W, H);
  pts.forEach(p => {
    const x = W * (p.ax + p.rx * Math.sin(p.fx * t + p.px));
    const y = H * (p.ay + p.ry * Math.cos(p.fy * t + p.py));
    const g = ctx.createRadialGradient(x, y, 0, x, y, p.r);
    g.addColorStop(0,  p.c + '0.36)');
    g.addColorStop(.5, p.c + '0.11)');
    g.addColorStop(1,  p.c + '0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  });
  const v = ctx.createRadialGradient(W/2, H/2, H*.12, W/2, H/2, H*.88);
  v.addColorStop(0, 'rgba(0,0,0,0)');
  v.addColorStop(1, 'rgba(0,0,0,.5)');
  ctx.fillStyle = v;
  ctx.fillRect(0, 0, W, H);
}

let t0 = null;
(function loop(ts){
  if(!t0) t0 = ts;
  mesh(ts - t0);
  requestAnimationFrame(loop);
})(0);

// ── GLOW CURSOR ───────────────────────────────────────────────────────────────
const gl = document.getElementById('glow');
addEventListener('mousemove', e => {
  gl.style.left = e.clientX + 'px';
  gl.style.top  = e.clientY + 'px';
});

// ── MAGNETIC BUTTONS ──────────────────────────────────────────────────────────
document.querySelectorAll('button').forEach(b => {
  b.addEventListener('mousemove', e => {
    const r = b.getBoundingClientRect();
    b.style.transform = `translate(${(e.clientX - r.left - r.width/2) * .2}px,${(e.clientY - r.top - r.height/2) * .2}px) scale(1.08)`;
  });
  b.addEventListener('mouseleave', () => {
    b.style.transition = 'transform .4s cubic-bezier(.34,1.56,.64,1)';
    b.style.transform  = 'translate(0,0) scale(1)';
    setTimeout(() => b.style.transition = '', 400);
  });
});

document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('mousemove', e => {
    if(item.classList.contains('active')) return;
    const r = item.getBoundingClientRect();
    item.style.transform = `translateY(${(e.clientY - r.top - r.height/2) * .12}px)`;
  });
  item.addEventListener('mouseleave', () => {
    item.style.transition = 'transform .4s cubic-bezier(.34,1.56,.64,1)';
    item.style.transform  = 'translateY(0)';
    setTimeout(() => item.style.transition = '', 400);
  });
});

// ── FLOATING PARTICLES ────────────────────────────────────────────────────────
for(let i = 0; i < 8; i++){
  const p  = document.createElement('div');
  p.className = 'particle';
  const sz = 2 + Math.random() * 4;
  Object.assign(p.style, {
    width            : sz + 'px',
    height           : sz + 'px',
    left             : Math.random() * 100 + 'vw',
    top              : (60 + Math.random() * 40) + 'vh',
    animationDuration: (9  + Math.random() * 14) + 's',
    animationDelay   : Math.random() * 10 + 's'
  });
  document.body.appendChild(p);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadMessages();
</script>
