<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>InternSync — Auth</title>
<style>
:root { --accent:#d9a441; }

*{ margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }

body{
  height:100vh; display:flex; justify-content:center; align-items:center;
  background:#1a1d0f; overflow:hidden;
}

#meshCanvas{ position:fixed; inset:0; z-index:0; pointer-events:none; }

.glow{
  position:fixed; width:300px; height:300px;
  background:radial-gradient(circle,rgba(217,164,65,.25),transparent);
  border-radius:50%; pointer-events:none; filter:blur(80px);
  transform:translate(-50%,-50%); z-index:1;
}

/* ── LOGO ── */
.logo{
  position:fixed; top:25px; left:30px; z-index:10;
  width:52px; height:52px;
}
.logo span{
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-family:'Georgia',serif;
  font-size:50px; font-weight:bold; line-height:1;
  user-select:none;
}
.logo .i{ color:#fff; z-index:1; }
.logo .s{
  color:transparent; z-index:2;
  background:linear-gradient(120deg,transparent 30%,#d9a441 50%,transparent 70%);
  background-size:200% 100%; -webkit-background-clip:text; background-clip:text;
  animation:shimmer 3s infinite linear;
}
@keyframes shimmer{ from{background-position:-200% 0} to{background-position:200% 0} }

.container{ perspective:1000px; z-index:5; position:relative; }
.card{
  width:390px; padding:35px; border-radius:18px;
  background:rgba(255,255,255,.06); backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.15);
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  transition:transform .2s ease;
}

h2{ text-align:center; color:#fff; margin-bottom:20px; font-size:20px; letter-spacing:.05em; }

.role-tabs{ display:flex; gap:8px; margin-bottom:18px; }
.role-tab{
  flex:1; padding:9px; border-radius:10px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);
  color:rgba(255,255,255,.5); font-size:13px; font-weight:600;
  cursor:pointer; text-align:center; margin:0; width:auto;
  transition:all .2s;
}
.role-tab:hover{
  background:rgba(217,164,65,.1)!important;
  border-color:rgba(217,164,65,.3)!important;
  color:rgba(255,255,255,.85)!important;
  box-shadow:none!important; letter-spacing:0!important;
}
.role-tab.active{
  background:rgba(217,164,65,.18)!important;
  border-color:var(--accent)!important;
  color:var(--accent)!important;
  box-shadow:0 0 12px rgba(217,164,65,.2)!important;
}

input, select{
  width:100%; padding:12px; margin:8px 0;
  border:1px solid rgba(255,255,255,.08); border-radius:10px;
  background:rgba(255,255,255,.1); color:#fff; outline:none;
  font-size:14px; transition:background .2s,border-color .2s;
}
input:focus,select:focus{
  background:rgba(255,255,255,.16); border-color:rgba(217,164,65,.45);
}
input::placeholder{ color:rgba(255,255,255,.38); }

.iw{ position:relative; }
.iw input{ margin:8px 0; padding-right:44px; }

.eye{
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  background:none!important; border:none!important; box-shadow:none!important;
  width:auto!important; padding:0!important; margin:0!important;
  cursor:pointer; color:rgba(255,255,255,.4);
  transition:color .2s!important; letter-spacing:0!important;
  display:flex; align-items:center;
}
.eye:hover{
  background:none!important; color:rgba(255,255,255,.85)!important;
  border-color:transparent!important; box-shadow:none!important;
  letter-spacing:0!important; transform:translateY(-50%)!important;
}
.eye svg{ width:18px; height:18px; pointer-events:none; }

/* MENTOR CODE SLIDE */
.mentor-field{ overflow:hidden; max-height:0; opacity:0; transition:max-height .35s ease, opacity .3s ease; }
.mentor-field.open{ max-height:90px; opacity:1; }

button{
  width:100%; padding:12px; margin-top:10px;
  border:2px solid transparent; border-radius:30px;
  background:var(--accent); color:#fff;
  font-family:'Segoe UI',sans-serif; font-weight:bold;
  font-size:14px; letter-spacing:.5px; cursor:pointer;
  transition:box-shadow .25s,background .25s,border-color .25s,color .25s,letter-spacing .25s;
}
button:hover{
  background:transparent; border-color:var(--accent); color:var(--accent);
  box-shadow:0 8px 28px rgba(217,164,65,.4),0 0 0 4px rgba(217,164,65,.1);
  letter-spacing:1.5px;
}
button:active{ box-shadow:0 3px 12px rgba(217,164,65,.3); }

.btn-g{
  background:rgba(255,255,255,.95)!important; color:#333!important;
  display:flex; align-items:center; justify-content:center;
  gap:10px; font-weight:600; border-color:transparent!important;
  margin-top:0;
}
.btn-g:hover{
  background:#fff!important; border-color:rgba(255,255,255,.4)!important;
  color:#111!important; letter-spacing:.5px!important;
  box-shadow:0 6px 20px rgba(0,0,0,.3)!important;
}

.btn-sec{
  background:rgba(255,255,255,.08)!important;
  border-color:rgba(255,255,255,.15)!important;
  color:#fff!important; margin-top:8px;
}
.btn-sec:hover{
  background:rgba(255,255,255,.14)!important;
  border-color:rgba(255,255,255,.35)!important;
  color:#fff!important; letter-spacing:1.5px;
}

.link-row{ display:flex; justify-content:space-between; margin-top:14px; }
.tlink{
  color:rgba(217,164,65,.8); font-size:12.5px; cursor:pointer;
  background:none!important; border:none!important; width:auto!important;
  padding:0!important; margin:0!important; letter-spacing:0!important;
  font-family:'Segoe UI',sans-serif; transition:color .2s!important; box-shadow:none!important;
}
.tlink:hover{
  color:var(--accent)!important; background:none!important;
  border-color:transparent!important; box-shadow:none!important;
  letter-spacing:0!important; transform:none!important;
}

.div{
  display:flex; align-items:center; gap:10px;
  margin:14px 0; color:rgba(255,255,255,.3); font-size:12px;
}
.div::before,.div::after{ content:''; flex:1; height:1px; background:rgba(255,255,255,.12); }

.err{ color:#ff6b6b; font-size:13px; margin-top:6px; min-height:18px; }
.note{ color:rgba(255,255,255,.4); font-size:12.5px; text-align:center; margin-top:12px; line-height:1.6; }
.hidden{ display:none; }

.btn-loading{ opacity:.7; pointer-events:none; letter-spacing:.5px!important; }

.toast{
  position:fixed; bottom:30px; left:50%;
  transform:translateX(-50%) translateY(20px);
  background:rgba(28,32,16,.96); border:1px solid rgba(217,164,65,.35);
  color:#fff; padding:12px 24px; border-radius:30px;
  font-size:13px; opacity:0; pointer-events:none;
  transition:opacity .3s,transform .3s; z-index:999; white-space:nowrap;
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

/* ── OTP BOXES ── */
.otp-row{
  display:flex; gap:8px; justify-content:center; margin:14px 0;
}
.otp-box{
  width:44px !important; height:54px; padding:0 !important; margin:0 !important;
  text-align:center; font-size:22px; font-weight:bold; letter-spacing:0;
  border:1.5px solid rgba(255,255,255,.15); border-radius:10px;
  background:rgba(255,255,255,.1); color:#fff;
  transition:border-color .2s, background .2s, box-shadow .2s;
  caret-color:#d9a441;
}
.otp-box:focus{
  border-color:#d9a441; background:rgba(255,255,255,.16);
  outline:none; box-shadow:0 0 0 3px rgba(217,164,65,.15);
}
.otp-box.filled{ border-color:rgba(217,164,65,.55); }

/* OTP timer */
.otp-timer{
  text-align:center; font-size:12px; color:rgba(255,255,255,.35);
  margin-top:4px;
}
.otp-timer span{ color:#d9a441; font-weight:600; }

/* Step indicator */
.step-dots{
  display:flex; justify-content:center; gap:6px; margin-bottom:18px;
}
.step-dot{
  width:8px; height:8px; border-radius:50%;
  background:rgba(255,255,255,.15); transition:all .3s;
}
.step-dot.active{ background:#d9a441; box-shadow:0 0 8px rgba(217,164,65,.5); }
.step-dot.done{ background:rgba(217,164,65,.4); }

/* Success checkmark */
.success-icon{
  width:60px; height:60px; border-radius:50%;
  background:rgba(217,164,65,.15); border:2px solid #d9a441;
  display:flex; align-items:center; justify-content:center;
  margin:0 auto 16px; animation:popIn .4s ease;
}
@keyframes popIn{
  from{ transform:scale(0); opacity:0; }
  to{ transform:scale(1); opacity:1; }
}
</style>
</head>

<div class="container">
 <div class="card" id="card">

  <!-- ══ HOME ══ -->

 </div><!-- /card -->
</div><!-- /container -->

<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:3000/api';
const MENTOR_CODE = 'men_770';
let role = 'intern';
let otpEmail = '';
let otpTimerInterval = null;

/* ─────────────────────────────
   TOGGLE PASSWORD EYE
───────────────────────────── */
function toggleEye(inputId, btn) {
  const input = document.getElementById(inputId);
  const svg   = btn.querySelector('svg');
  if (input.type === 'password') {
    input.type = 'text';
    svg.innerHTML = `
      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
      <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
      <line x1="1" y1="1" x2="23" y2="23"/>`;
  } else {
    input.type = 'password';
    svg.innerHTML = `
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>`;
  }
}

/* ─────────────────────────────
   TOAST
───────────────────────────── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

/* ─────────────────────────────
   VIEW SWITCH
───────────────────────────── */
function go(name) {
  ['home','login','signup','forgot','otp','newpw'].forEach(v => {
    const el = document.getElementById('v-'+v);
    if (el) el.classList.add('hidden');
  });
  document.getElementById('v-'+name).classList.remove('hidden');

  ['l-err','s-err','f-err','otp-err','np-err'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = '';
  });

  if (name === 'otp') {
    setTimeout(() => document.getElementById('otp0')?.focus(), 80);
  }
}

/* ─────────────────────────────
   ROLE SWITCH
───────────────────────────── */
function setRole(r, prefix) {
  role = r;
  ['l','s'].forEach(p => {
    ['intern','mentor'].forEach(t => {
      const el = document.getElementById(p+'tab-'+t);
      if (el) el.classList.toggle('active', t === r);
    });
  });
  ['l-mf','s-mf'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('open', r === 'mentor');
  });
}

/* ─────────────────────────────
   OTP TIMER (10 min)
───────────────────────────── */
function startOtpTimer(seconds) {
  clearInterval(otpTimerInterval);
  const resendBtn = document.getElementById('resend-btn');
  resendBtn.style.opacity = '.4';
  resendBtn.style.pointerEvents = 'none';

  let remaining = seconds;
  const el = document.getElementById('otp-countdown');

  function tick() {
    const m = String(Math.floor(remaining / 60)).padStart(2, '0');
    const s = String(remaining % 60).padStart(2, '0');
    if (el) el.textContent = `${m}:${s}`;

    if (remaining <= 0) {
      clearInterval(otpTimerInterval);
      if (el) el.textContent = 'Expired';
      resendBtn.style.opacity = '1';
      resendBtn.style.pointerEvents = 'auto';
    }
    remaining--;
  }

  tick();
  otpTimerInterval = setInterval(tick, 1000);
}

/* ─────────────────────────────
   OTP KEYBOARD NAVIGATION
───────────────────────────── */
function setupOtpBoxes() {
  for (let i = 0; i < 6; i++) {
    const box = document.getElementById('otp' + i);
    if (!box) continue;

    box.addEventListener('input', (e) => {
      const val = e.target.value.replace(/\D/g, '');
      e.target.value = val.slice(-1);
      box.classList.toggle('filled', !!val);
      if (val && i < 5) document.getElementById('otp' + (i + 1)).focus();
    });

    box.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace') {
        if (!box.value && i > 0) {
          const prev = document.getElementById('otp' + (i - 1));
          prev.value = '';
          prev.classList.remove('filled');
          prev.focus();
        }
        box.classList.remove('filled');
      }
      if (e.key === 'Enter') doVerifyOtp();
    });

    box.addEventListener('paste', (e) => {
      e.preventDefault();
      const pasted = (e.clipboardData || window.clipboardData)
        .getData('text').replace(/\D/g, '').slice(0, 6);
      pasted.split('').forEach((ch, idx) => {
        const b = document.getElementById('otp' + idx);
        if (b) { b.value = ch; b.classList.add('filled'); }
      });
      const lastIdx = Math.min(pasted.length, 5);
      document.getElementById('otp' + lastIdx)?.focus();
    });
  }
}

/* ─────────────────────────────
   PASSWORD STRENGTH
───────────────────────────── */
function setupPwStrength() {
  const input = document.getElementById('np-pw');
  const bar   = document.getElementById('pw-strength-bar');
  const label = document.getElementById('pw-strength-label');
  if (!input) return;

  input.addEventListener('input', () => {
    const pw = input.value;
    let score = 0;
    if (pw.length >= 6)  score++;
    if (pw.length >= 10) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;

    const levels = [
      { w:'0%',   bg:'transparent', txt:'' },
      { w:'25%',  bg:'#e74c3c',     txt:'Weak' },
      { w:'50%',  bg:'#e67e22',     txt:'Fair' },
      { w:'75%',  bg:'#f1c40f',     txt:'Good' },
      { w:'100%', bg:'#2ecc71',     txt:'Strong' },
    ];
    const lvl = levels[Math.min(score, 4)];
    bar.style.width      = lvl.w;
    bar.style.background = lvl.bg;
    label.textContent    = lvl.txt;
    label.style.color    = lvl.bg;
  });
}

/* ─────────────────────────────
   GOOGLE REDIRECT HANDLER
───────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token');

  if (token) {
    const id        = params.get('id');
    const name      = params.get('name');
    const roleParam = params.get('role');

    localStorage.setItem('token',      token);
    localStorage.setItem('internId',   id);
    localStorage.setItem('internName', name);
    localStorage.setItem('role',       roleParam);

    window.history.replaceState({}, document.title, window.location.pathname);

    window.location.href = roleParam === 'mentor'
      ? 'mentor-dashboard.html'
      : 'intern-dashboard.html';
  }

  const error = params.get('error');
  if (error) showToast('Google login failed. Please try again.');

  setupOtpBoxes();
  setupPwStrength();
});

/* ─────────────────────────────
   LOGIN
───────────────────────────── */
async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pw    = document.getElementById('l-pw').value;
  const err   = document.getElementById('l-err');
  const btn   = document.getElementById('login-btn');

  err.textContent = '';

  if (!email || !pw) { err.textContent = 'Please fill in all fields.'; return; }

  if (role === 'mentor') {
    const code = document.getElementById('l-code').value;
    if (code !== MENTOR_CODE) { err.textContent = 'Invalid mentor code.'; return; }
  }

  btn.textContent = 'Logging in...';
  btn.classList.add('btn-loading');

  try {
    const res  = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pw })
    });
    const data = await res.json();

    if (!res.ok) { err.textContent = data.error || 'Login failed'; return; }

    localStorage.setItem('internId',   data.id);
    localStorage.setItem('internName', data.name);
    localStorage.setItem('token',      data.token);
    localStorage.setItem('role',       data.role);

    window.location.href = data.role === 'mentor'
      ? 'mentor-dashboard.html'
      : 'intern-dashboard.html';

  } catch (e) {
    err.textContent = 'Server not reachable';
  } finally {
    btn.textContent = 'Login';
    btn.classList.remove('btn-loading');
  }
}

/* ─────────────────────────────
   SIGNUP
───────────────────────────── */
async function doSignup() {
  const name  = document.getElementById('s-name').value.trim();
  const email = document.getElementById('s-email').value.trim();
  const pw    = document.getElementById('s-pw').value;
  const err   = document.getElementById('s-err');
  const btn   = document.getElementById('signup-btn');

  err.textContent = '';

  if (!name || !email || !pw) { err.textContent = 'Please fill all fields'; return; }
  if (pw.length < 6) { err.textContent = 'Password must be at least 6 characters'; return; }

  if (role === 'mentor') {
    const code = document.getElementById('s-code').value;
    if (code !== MENTOR_CODE) { err.textContent = 'Invalid mentor code.'; return; }
  }

  btn.textContent = 'Creating account...';
  btn.classList.add('btn-loading');

  try {
    const res  = await fetch(`${API}/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password: pw, role })
    });
    const data = await res.json();

    if (!res.ok) { err.textContent = data.error || 'Signup failed'; return; }

    showToast('Account created! Please login.');
    go('login');

  } catch (e) {
    err.textContent = 'Server not reachable';
  } finally {
    btn.textContent = 'Create Account';
    btn.classList.remove('btn-loading');
  }
}

/* ─────────────────────────────
   STEP 1 — SEND OTP
───────────────────────────── */
async function doForgot() {
  const email = document.getElementById('f-email').value.trim();
  const err   = document.getElementById('f-err');
  const btn   = document.getElementById('forgot-btn');

  err.textContent = '';

  if (!email) { err.textContent = 'Please enter your email.'; return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    err.textContent = 'Please enter a valid email.'; return;
  }

  btn.textContent = 'Sending OTP...';
  btn.classList.add('btn-loading');

  try {
    const res  = await fetch(`${API}/auth/forgot-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();

    if (!res.ok) { err.textContent = data.error || 'Something went wrong.'; return; }

    otpEmail = email;
    document.getElementById('otp-email-display').textContent = email;

    for (let i = 0; i < 6; i++) {
      const b = document.getElementById('otp' + i);
      if (b) { b.value = ''; b.classList.remove('filled'); }
    }

    showToast('✓ OTP sent! Check your inbox.');
    go('otp');
    startOtpTimer(600);

  } catch (e) {
    err.textContent = 'Server not reachable';
  } finally {
    btn.textContent = 'Send OTP';
    btn.classList.remove('btn-loading');
  }
}

/* ─────────────────────────────
   RESEND OTP
───────────────────────────── */
async function doResend() {
  const err = document.getElementById('otp-err');
  err.textContent = '';

  for (let i = 0; i < 6; i++) {
    const b = document.getElementById('otp' + i);
    if (b) { b.value = ''; b.classList.remove('filled'); }
  }

  try {
    const res = await fetch(`${API}/auth/forgot-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: otpEmail })
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || 'Failed to resend.'; return; }
    showToast('✓ New OTP sent!');
    startOtpTimer(600);
    document.getElementById('otp0')?.focus();
  } catch (e) {
    err.textContent = 'Server not reachable';
  }
}

/* ─────────────────────────────
   STEP 2 — VERIFY OTP
───────────────────────────── */
async function doVerifyOtp() {
  const otp = [0,1,2,3,4,5].map(i => document.getElementById('otp'+i).value).join('');
  const err = document.getElementById('otp-err');
  const btn = document.getElementById('otp-btn');

  err.textContent = '';

  if (otp.length < 6) {
    err.textContent = 'Please enter the complete 6-digit OTP.'; return;
  }

  btn.textContent = 'Verifying...';
  btn.classList.add('btn-loading');

  try {
    const res  = await fetch(`${API}/auth/verify-otp`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: otpEmail, otp })
    });
    const data = await res.json();

    if (!res.ok) {
      err.textContent = data.error || 'Verification failed.';
      const boxes = document.querySelectorAll('.otp-box');
      boxes.forEach(b => {
        b.style.borderColor = '#ff6b6b';
        setTimeout(() => b.style.borderColor = '', 1000);
      });
      return;
    }

    clearInterval(otpTimerInterval);
    showToast('✓ OTP verified!');

    document.getElementById('np-pw').value  = '';
    document.getElementById('np-pw2').value = '';
    document.getElementById('pw-strength-bar').style.width = '0%';
    document.getElementById('pw-strength-label').textContent = '';

    go('newpw');

  } catch (e) {
    err.textContent = 'Server not reachable';
  } finally {
    btn.textContent = 'Verify OTP';
    btn.classList.remove('btn-loading');
  }
}

/* ─────────────────────────────
   STEP 3 — RESET PASSWORD
───────────────────────────── */
async function doResetPassword() {
  const pw   = document.getElementById('np-pw').value;
  const pw2  = document.getElementById('np-pw2').value;
  const err  = document.getElementById('np-err');
  const btn  = document.getElementById('newpw-btn');

  err.textContent = '';

  if (!pw || !pw2)   { err.textContent = 'Please fill both fields.'; return; }
  if (pw.length < 6) { err.textContent = 'Password must be at least 6 characters.'; return; }
  if (pw !== pw2)    { err.textContent = 'Passwords do not match.'; return; }

  btn.textContent = 'Updating...';
  btn.classList.add('btn-loading');

  try {
    const res  = await fetch(`${API}/auth/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: otpEmail, newPassword: pw })
    });
    const data = await res.json();

    if (!res.ok) { err.textContent = data.error || 'Reset failed.'; return; }

    showToast('✓ Password updated! Please login.');
    otpEmail = '';
    setTimeout(() => go('login'), 500);

  } catch (e) {
    err.textContent = 'Server not reachable';
  } finally {
    btn.textContent = 'Update Password';
    btn.classList.remove('btn-loading');
  }
}
