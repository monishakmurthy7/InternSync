<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InternSync — Discussion Room</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#d9a441; --accent2:#f0c060; --bg:#1a1d0f;
  --card-bg:rgba(255,255,255,0.055); --card-border:rgba(255,255,255,0.13);
  --text:#f0ede4; --muted:rgba(240,237,228,0.45);
  --teal:#2dd4bf; --red:#ff6b6b; --sidebar-w:230px;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; display:flex; flex-direction:column; }
#meshCanvas{ position:fixed; inset:0; z-index:0; pointer-events:none; }
.glow{ position:fixed; width:380px; height:380px; background:radial-gradient(circle,rgba(217,164,65,.18),transparent 70%); border-radius:50%; pointer-events:none; filter:blur(60px); transform:translate(-50%,-50%); z-index:1; }
.layout{ display:flex; flex:1; position:relative; z-index:5; overflow:hidden; }

/* ── SIDEBAR ── */
.sidebar{ width:var(--sidebar-w); flex-shrink:0; background:rgba(10,13,6,.6); backdrop-filter:blur(20px); border-right:1px solid rgba(255,255,255,.07); padding:24px 0; display:flex; flex-direction:column; overflow-y:auto; }
.sidebar::-webkit-scrollbar{ width:3px; }
.sidebar::-webkit-scrollbar-thumb{ background:rgba(217,164,65,.15); border-radius:4px; }
.sidebar-section{ font-family:'Syne',sans-serif; font-size:9px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:rgba(240,237,228,.2); padding:0 20px; margin:18px 0 8px; }
.sidebar-section:first-child{ margin-top:0; }
.nav-item{ display:flex; align-items:center; gap:11px; padding:10px 20px; cursor:pointer; position:relative; color:var(--muted); font-size:13px; font-weight:500; transition:color .2s,background .2s; text-decoration:none; }
.nav-item svg{ width:16px; height:16px; stroke:currentColor; flex-shrink:0; }
.nav-item:hover{ color:var(--text); background:rgba(255,255,255,.04); }
.nav-item.active{ color:var(--accent); background:rgba(217,164,65,.08); border-right:2px solid var(--accent); }
.nav-item.active svg{ stroke:var(--accent); }

/* ── MAIN ── */
main{ flex:1; display:flex; flex-direction:column; overflow:hidden; padding:28px 32px 0; }
.page-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-shrink:0; }
.section-title{ font-family:'Syne',sans-serif; font-size:13px; font-weight:600; letter-spacing:.18em; text-transform:uppercase; color:var(--accent); display:flex; align-items:center; gap:10px; flex:1; }
.section-title::after{ content:''; flex:1; height:1px; background:rgba(217,164,65,.18); }
.live-badge{ display:flex; align-items:center; gap:6px; background:rgba(45,212,191,.1); border:1px solid rgba(45,212,191,.2); border-radius:20px; padding:4px 10px; font-family:'Syne',sans-serif; font-size:10px; font-weight:700; color:var(--teal); flex-shrink:0; margin-left:14px; }
.live-dot{ width:6px; height:6px; border-radius:50%; background:var(--teal); box-shadow:0 0 6px rgba(45,212,191,.8); animation:livePulse 1.4s ease-in-out infinite; }
@keyframes livePulse{ 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

/* ── WHO'S HERE BAR ── */
.members-bar{ display:flex; gap:10px; margin-bottom:16px; flex-shrink:0; flex-wrap:wrap; }
.member-chip{ display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.09); border-radius:40px; padding:5px 12px 5px 5px; transition:background .2s,border-color .2s,transform .2s; }
.member-chip:hover{ background:rgba(217,164,65,.08); border-color:rgba(217,164,65,.22); transform:translateY(-2px); }
.chip-avatar{ width:26px; height:26px; border-radius:50%; overflow:hidden; flex-shrink:0; }
.chip-avatar img{ width:100%; height:100%; object-fit:cover; object-position:center 15%; border-radius:50%; display:block; }
.chip-av-init{ width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:700; font-size:9px; flex-shrink:0; }
.chip-name{ font-size:11px; font-weight:500; color:var(--text); }
.online-dot{ width:6px; height:6px; border-radius:50%; background:var(--teal); box-shadow:0 0 5px rgba(45,212,191,.6); flex-shrink:0; }

/* ── CHAT ROOM ── */
.chat-room{ flex:1; display:flex; flex-direction:column; background:var(--card-bg); border:1px solid var(--card-border); border-radius:18px 18px 0 0; backdrop-filter:blur(20px); box-shadow:0 -4px 24px rgba(0,0,0,.25); overflow:hidden; animation:roomIn .55s cubic-bezier(.22,1,.36,1) forwards; opacity:0; transform:translateY(20px); }
@keyframes roomIn{ to{opacity:1;transform:translateY(0)} }

/* ── MESSAGES ── */
.messages{ flex:1; overflow-y:auto; padding:20px 22px; display:flex; flex-direction:column; gap:16px; }
.messages::-webkit-scrollbar{ width:4px; }
.messages::-webkit-scrollbar-track{ background:transparent; }
.messages::-webkit-scrollbar-thumb{ background:rgba(217,164,65,.2); border-radius:4px; }

.msg-row{ display:flex; gap:10px; align-items:flex-end; }
.msg-row.me{ flex-direction:row-reverse; }
.msg-avatar{ width:30px; height:30px; border-radius:50%; flex-shrink:0; overflow:hidden; border:1.5px solid rgba(255,255,255,.12); }
.msg-avatar img{ width:100%; height:100%; object-fit:cover; object-position:center 15%; border-radius:50%; display:block; }
.msg-av-init{ width:30px; height:30px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:700; font-size:10px; border:1.5px solid rgba(255,255,255,.12); }
.msg-content{ max-width:62%; display:flex; flex-direction:column; gap:3px; }
.msg-row.me .msg-content{ align-items:flex-end; }
.msg-author{ font-size:11px; font-weight:600; color:var(--muted); padding:0 4px; }
.msg-bubble{ padding:10px 14px; border-radius:16px; font-size:13px; line-height:1.6; word-break:break-word; }
.msg-row:not(.me) .msg-bubble{ background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.08); border-bottom-left-radius:4px; }
.msg-row.me .msg-bubble{ background:rgba(217,164,65,.18); border:1px solid rgba(217,164,65,.28); border-bottom-right-radius:4px; }
.msg-time{ font-size:10px; color:rgba(240,237,228,.2); padding:0 4px; }

.time-divider{ display:flex; align-items:center; gap:12px; margin:4px 0; }
.time-divider::before,.time-divider::after{ content:''; flex:1; height:1px; background:rgba(255,255,255,.05); }
.time-divider span{ font-size:10px; color:rgba(240,237,228,.2); white-space:nowrap; font-family:'Syne',sans-serif; letter-spacing:.08em; }

.empty-state{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:var(--muted); }
.empty-state svg{ width:36px; height:36px; stroke:var(--muted); opacity:.4; }
.empty-state p{ font-size:13px; opacity:.6; }

/* ── INPUT AREA ── */
.input-area{ display:flex; align-items:flex-end; gap:10px; padding:14px 18px 18px; border-top:1px solid rgba(255,255,255,.06); background:rgba(10,13,6,.4); flex-shrink:0; }
.sender-label{ display:flex; align-items:center; gap:8px; flex-shrink:0; }
.sender-av{ width:32px; height:32px; border-radius:50%; overflow:hidden; border:1.5px solid rgba(217,164,65,.3); }
.sender-av img{ width:100%; height:100%; object-fit:cover; object-position:center 15%; }
.input-wrap{ flex:1; position:relative; }
textarea#msgInput{ width:100%; padding:11px 16px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.09); border-radius:12px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px; resize:none; outline:none; line-height:1.5; max-height:120px; transition:border-color .2s,background .2s,box-shadow .2s; overflow-y:auto; }
textarea#msgInput:focus{ border-color:rgba(217,164,65,.4); background:rgba(255,255,255,.1); box-shadow:0 0 0 3px rgba(217,164,65,.07); }
textarea#msgInput::placeholder{ color:rgba(240,237,228,.2); }
textarea#msgInput:disabled{ opacity:.5; cursor:not-allowed; }
.btn-send{ width:42px; height:42px; border-radius:12px; flex-shrink:0; background:var(--accent); border:2px solid transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .25s,box-shadow .25s,border-color .25s,transform .2s; }
.btn-send:hover{ background:transparent; border-color:var(--accent); box-shadow:0 4px 16px rgba(217,164,65,.35); }
.btn-send:hover svg{ stroke:var(--accent); }
.btn-send svg{ width:17px; height:17px; stroke:#1a1d0f; transition:stroke .25s; }
.btn-send:disabled{ opacity:.5; cursor:not-allowed; }

.status-bar{ font-size:11px; color:var(--muted); padding:6px 22px 0; text-align:right; flex-shrink:0; min-height:20px; }
.status-bar.err{ color:var(--red); }
.status-bar.ok{ color:var(--teal); }

/* ── MISC ── */
.particle{ position:fixed; border-radius:50%; background:rgba(217,164,65,.14); pointer-events:none; z-index:2; animation:floatUp linear infinite; }
@keyframes floatUp{ 0%{transform:translateY(0) scale(1);opacity:.4} 50%{transform:translateY(-70px) scale(1.1);opacity:.15} 100%{transform:translateY(-140px) scale(.8);opacity:0} }
</style>
</head>

  <script src="intern-nav.js"></script>
<canvas id="meshCanvas"></canvas>
<div class="glow" id="glow"></div>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">Menu</div>

    <a class="nav-item" href="intern-content.html"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>Content for You</a>

  <main>
    <div class="page-header">
      <div class="section-title">Discussion Room</div>
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    </div>

    <div class="members-bar" id="membersBar"></div>

    <div class="chat-room" id="chatRoom">
      <div class="messages" id="messages">

          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>

        </button>

<script>
// ─────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────
const API = 'http://localhost:3000/api';
const POLL_INTERVAL = 3000;

// ─────────────────────────────────────────────────────────────
// ALL 10 INTERNS
// ─────────────────────────────────────────────────────────────
const MEMBERS = [
  { name:'Monisha K',     photo:'../images/monisha.jpeg',    color:'#d9a441', bg:'rgba(217,164,65' },
  { name:'Fiona Shalet',  photo:'../images/fiona.jpeg',     color:'#2dd4bf', bg:'rgba(45,212,191' },
  { name:'Stella Mary',   photo:'../images/stella.jpeg',    color:'#ff6b6b', bg:'rgba(255,107,107' },
  { name:'Bhavana R',     photo:'../images/bhavana.jpeg',   color:'#4ade80', bg:'rgba(74,222,128' },
  { name:'Deekshitha S',  photo:'../images/deekshitha.jpeg',color:'#c084fc', bg:'rgba(168,85,247' },
  { name:'Arun Prasad',   photo:'../images/arun.jpeg',      color:'#fbbf24', bg:'rgba(251,191,36' },
  { name:'Shonn Dias',    photo:'../images/shonn.jpeg',     color:'#38bdf8', bg:'rgba(56,189,248' },
  { name:'Bhoomika Ravi', photo:'../images/bhoomika.jpeg',  color:'#fb7185', bg:'rgba(251,113,133' },
  { name:'Hrithika Gowda',photo:'../images/hrithika.jpeg',  color:'#818cf8', bg:'rgba(99,102,241' },
  { name:'Vinay Kumar',   photo:'../images/vinay.jpeg',     color:'#2dd4bf', bg:'rgba(20,184,166' },
];

// ─────────────────────────────────────────────────────────────
// STATE — Monisha K is always the logged-in user
// ─────────────────────────────────────────────────────────────
const ME = MEMBERS[0]; // Monisha K
let lastTimestamp = null;
let pollTimer     = null;
let renderedIds   = new Set();

// ─────────────────────────────────────────────────────────────
// HELPER — get member meta by name
// ─────────────────────────────────────────────────────────────
function getMember(name) {
  return MEMBERS.find(m => m.name === name) || { name, photo:'', color:'#d9a441', bg:'rgba(217,164,65' };
}

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function avatarHTML(member, size = 30, cssClass = 'msg-avatar') {
  if (member.photo) {
    return `<div class="${cssClass}" style="width:${size}px;height:${size}px;">
      <img src="${member.photo}" alt="${member.name}" style="width:100%;height:100%;object-fit:cover;object-position:center 15%;border-radius:50%;display:block;">
    </div>`;
  }
  return `<div class="msg-av-init" style="width:${size}px;height:${size}px;background:${member.bg},.25);color:${member.color};font-size:${Math.round(size*0.35)}px;">${initials(member.name)}</div>`;
}

// ─────────────────────────────────────────────────────────────
// MEMBERS BAR
// ─────────────────────────────────────────────────────────────
function buildMembersBar() {
  const bar = document.getElementById('membersBar');
  MEMBERS.forEach(m => {
    const chip = document.createElement('div');
    chip.className = 'member-chip';
    const avPart = m.photo
      ? `<div class="chip-avatar"><img src="${m.photo}" alt="${m.name}"></div>`
      : `<div class="chip-av-init" style="background:${m.bg},.25);color:${m.color};">${initials(m.name)}</div>`;
    chip.innerHTML = `${avPart}<span class="chip-name">${m.name.split(' ')[0]}</span><div class="online-dot"></div>`;
    bar.appendChild(chip);
  });
}

// ─────────────────────────────────────────────────────────────
// FORMAT TIME
// ─────────────────────────────────────────────────────────────
function fmtTime(isoOrDate) {
  const d = new Date(isoOrDate);
  return d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
}
function fmtDate(isoOrDate) {
  const d = new Date(isoOrDate);
  const today = new Date();
  if (d.toDateString() === today.toDateString()) return 'Today';
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}

// ─────────────────────────────────────────────────────────────
// RENDER ONE MESSAGE
// ─────────────────────────────────────────────────────────────
let lastDateLabel = null;

function renderMessage(msg, animate = false) {
  if (renderedIds.has(msg.id)) return;
  renderedIds.add(msg.id);

  const container = document.getElementById('messages');
  const empty     = document.getElementById('emptyState');
  if (empty) empty.remove();

  const member = getMember(msg.sender_name);
  const isMe   = msg.sender_name === ME.name;
  const dateLabel = fmtDate(msg.created_at);

  if (dateLabel !== lastDateLabel) {
    lastDateLabel = dateLabel;
    const div = document.createElement('div');
    div.className = 'time-divider';
    div.innerHTML = `<span>${dateLabel}</span>`;
    container.appendChild(div);
  }

  const row = document.createElement('div');
  row.className = `msg-row${isMe ? ' me' : ''}`;
  row.dataset.id = msg.id;

  if (animate) {
    row.style.opacity   = '0';
    row.style.transform = `translateY(${isMe ? '8px' : '-8px'})`;
    row.style.transition = 'opacity .35s, transform .35s';
  }

  row.innerHTML = `
    ${avatarHTML(member, 30, isMe ? 'msg-avatar me-av' : 'msg-avatar')}
    <div class="msg-content">
      ${!isMe ? `<span class="msg-author">${member.name}</span>` : ''}
      <div class="msg-bubble">${escapeHTML(msg.message)}</div>
      <span class="msg-time">${fmtTime(msg.created_at)}</span>
    </div>
  `;
  container.appendChild(row);

  if (animate) {
    requestAnimationFrame(() => requestAnimationFrame(() => {
      row.style.opacity   = '1';
      row.style.transform = 'translateY(0)';
    }));
  }

  if (!lastTimestamp || new Date(msg.created_at) > new Date(lastTimestamp)) {
    lastTimestamp = msg.created_at;
  }
}

function escapeHTML(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ─────────────────────────────────────────────────────────────
// LOAD ALL MESSAGES ON INIT
// ─────────────────────────────────────────────────────────────
async function loadAllMessages() {
  setStatus('Loading messages…', '');
  try {
    const res  = await fetch(`${API}/discussion`);
    const data = await res.json();
    if (!data.success) throw new Error(data.message);
    data.messages.forEach(m => renderMessage(m, false));
    scrollBottom();
    setStatus('', '');
  } catch (err) {
    setStatus('⚠ Could not load messages: ' + err.message, 'err');
    console.error('loadAllMessages:', err);
  }
}

// ─────────────────────────────────────────────────────────────
// POLLING
// ─────────────────────────────────────────────────────────────
function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    try {
      const since = lastTimestamp || new Date(0).toISOString();
      const res   = await fetch(`${API}/discussion/poll?since=${encodeURIComponent(since)}`);
      const data  = await res.json();
      if (!data.success) return;
      let hasNew = false;
      data.messages.forEach(m => {
        if (!renderedIds.has(m.id)) { renderMessage(m, true); hasNew = true; }
      });
      if (hasNew) scrollBottom();
    } catch (err) {
      console.warn('poll error:', err.message);
    }
  }, POLL_INTERVAL);
}

// ─────────────────────────────────────────────────────────────
// SEND MESSAGE
// ─────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text) return;

  input.disabled = true;
  document.getElementById('sendBtn').disabled = true;

  try {
    const res = await fetch(`${API}/discussion`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sender_name:  ME.name,
        sender_photo: ME.photo || '',
        message:      text
      })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message);
    renderMessage(data.message, true);
    scrollBottom();
    input.value = '';
    input.style.height = 'auto';
  } catch (err) {
    setStatus('⚠ Failed to send: ' + err.message, 'err');
    console.error('sendMessage:', err);
  } finally {
    input.disabled = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
}

// ─────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────
function scrollBottom() {
  const c = document.getElementById('messages');
  c.scrollTop = c.scrollHeight;
}

function setStatus(msg, cls) {
  const s = document.getElementById('statusBar');
  s.textContent = msg;
  s.className = 'status-bar' + (cls ? ' ' + cls : '');
}

// ─────────────────────────────────────────────────────────────
// KEYBOARD
// ─────────────────────────────────────────────────────────────
document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('msgInput').addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// ─────────────────────────────────────────────────────────────
// INIT — set up sender avatar and load messages immediately
// ─────────────────────────────────────────────────────────────
buildMembersBar();

// Populate sender avatar in input bar
document.getElementById('senderLabel').innerHTML = avatarHTML(ME, 32, 'sender-av');
document.getElementById('msgInput').placeholder = `Message as ${ME.name.split(' ')[0]}…`;

// Load messages and start polling
loadAllMessages().then(startPolling);

// ─────────────────────────────────────────────────────────────
// MESH BACKGROUND
// ─────────────────────────────────────────────────────────────
const cvs = document.getElementById('meshCanvas'), ctx = cvs.getContext('2d');
let W, H;
function rsz() { W = cvs.width = innerWidth; H = cvs.height = innerHeight; }
rsz(); addEventListener('resize', rsz);
const pts = [{ax:.65,ay:.25,rx:.3,ry:.2,fx:.00028,fy:.00016,px:0,py:1,r:620,c:'rgba(180,120,20,'},{ax:.2,ay:.65,rx:.22,ry:.28,fx:.00018,fy:.00026,px:2.4,py:0,r:540,c:'rgba(155,100,15,'},{ax:.5,ay:.1,rx:.28,ry:.2,fx:.00022,fy:.00014,px:1,py:2,r:580,c:'rgba(50,65,20,'},{ax:.88,ay:.78,rx:.2,ry:.22,fx:.00013,fy:.00031,px:.5,py:.8,r:500,c:'rgba(44,58,18,'},{ax:.08,ay:.18,rx:.18,ry:.22,fx:.00025,fy:.0002,px:3,py:1.5,r:460,c:'rgba(20,24,12,'},{ax:.55,ay:.88,rx:.24,ry:.18,fx:.00017,fy:.00023,px:1.8,py:2.7,r:490,c:'rgba(28,32,16,'}];
function mesh(t) { ctx.fillStyle='#1a1d0f'; ctx.fillRect(0,0,W,H); pts.forEach(p=>{ const x=W*(p.ax+p.rx*Math.sin(p.fx*t+p.px)),y=H*(p.ay+p.ry*Math.cos(p.fy*t+p.py)),g=ctx.createRadialGradient(x,y,0,x,y,p.r); g.addColorStop(0,p.c+'0.36)'); g.addColorStop(.5,p.c+'0.11)'); g.addColorStop(1,p.c+'0)'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); }); const v=ctx.createRadialGradient(W/2,H/2,H*.12,W/2,H/2,H*.88); v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,'rgba(0,0,0,.5)'); ctx.fillStyle=v; ctx.fillRect(0,0,W,H); }
let t0 = null; (function loop(ts) { if (!t0) t0 = ts; mesh(ts - t0); requestAnimationFrame(loop); })(0);

// ─── GLOW ─────────────────────────────────────────────────────
const gl = document.getElementById('glow');
addEventListener('mousemove', e => { gl.style.left = e.clientX + 'px'; gl.style.top = e.clientY + 'px'; });

document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('mousemove', e => { const r = item.getBoundingClientRect(); if (!item.classList.contains('active')) item.style.transform = `translateY(${(e.clientY-r.top-r.height/2)*.12}px)`; });
  item.addEventListener('mouseleave', () => { item.style.transition='transform .4s cubic-bezier(.34,1.56,.64,1)'; item.style.transform='translateY(0)'; setTimeout(()=>item.style.transition='',400); });
});

// ─── FLOATING PARTICLES ───────────────────────────────────────
for (let i = 0; i < 8; i++) {
  const p = document.createElement('div'); p.className = 'particle';
  const sz = 2 + Math.random() * 4;
  Object.assign(p.style, { width:sz+'px', height:sz+'px', left:Math.random()*100+'vw', top:(60+Math.random()*40)+'vh', animationDuration:(9+Math.random()*14)+'s', animationDelay:Math.random()*10+'s' });
  document.body.appendChild(p);
}
</script>
</body>
